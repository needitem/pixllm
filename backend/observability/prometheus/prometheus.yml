global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: pixllm
    environment: local

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: pixllm-agent-api
    metrics_path: /api/v1/metrics
    static_configs:
      - targets:
          - agent-api:8000
        labels:
          service: agent-api
