services:
  agent-api:
    build:
      context: .
      dockerfile: Dockerfile.agent
    image: pixllm-wiki-api
    container_name: pixllm-wiki-api
    restart: unless-stopped
    ports:
      - "${AGENT_API_HOST_PORT:-8000}:8000"
    environment:
      PIXLLM_APP_NAME: ${PIXLLM_APP_NAME:-PIXLLM Wiki API}
      PIXLLM_API_PREFIX: ${PIXLLM_API_PREFIX:-/api/v1}
      WIKI_PROFILE_DIR: ${WIKI_PROFILE_DIR:-.profiles}
      WORKFLOW_CLASSIFIER_URL: ${WORKFLOW_CLASSIFIER_URL:-http://192.168.2.238:8003}
      WORKFLOW_CLASSIFIER_MODEL: ${WORKFLOW_CLASSIFIER_MODEL:-workflow-classifier-qwen}
    volumes:
      - ./.profiles:/app/.profiles
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready').read()"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
