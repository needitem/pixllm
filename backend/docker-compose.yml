services:
  agent-api:
    build:
      context: .
      dockerfile: Dockerfile.agent
    image: pixllm-source-api
    container_name: pixllm-source-api
    restart: unless-stopped
    ports:
      - "${AGENT_API_HOST_PORT:-8000}:8000"
    environment:
      PIXLLM_APP_NAME: ${PIXLLM_APP_NAME:-PIXLLM Source API}
      PIXLLM_API_PREFIX: ${PIXLLM_API_PREFIX:-/api/v1}
      PIXLLM_SOURCE_DATA_DIR: ${PIXLLM_SOURCE_DATA_DIR:-.profiles}
      RAW_SOURCE_ROOT: ${RAW_SOURCE_ROOT:-/app/.profiles/raw_source/source}
      SOURCE_RUNTIME_DIR: ${SOURCE_RUNTIME_DIR:-.profiles/source}
    volumes:
      - ./.profiles:/app/.profiles
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready').read()"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
