# PIXLLM RAG Configuration
# This file consolidates routing, retrieval, context, and react settings.
# Environment variables override these values when set.

routing:
  confidence_threshold: 0.72
  probe_enabled: true
  probe_top_k: 5
  code_first_response_types:
    - code_explain
    - code_review
    - bug_fix
    - code_generate
    - refactor
    - troubleshooting
    - design_review
    - compare
    - migration
    - api_lookup
  doc_first_response_types:
    - doc_lookup

retrieval:
  max_rounds: 2
  initial_top_k: 16
  top_k_step: 3
  top_k_cap: 50
  query_rewrite_enabled: true
  query_rewrite_max_candidates: 3

context:
  max_chars: 5000
  max_line_span: 220
  doc_limit: 5
  code_limit: 6

react:
  max_rounds: 3
  max_tool_calls: 8
  # Overall ReAct loop timeout in seconds. Set to 0 to disable.
  # Override: CHAT_REACT_TIMEOUT_SEC
  timeout_sec: 60
  # Stage-specific time budgets used by streaming and long-running generation paths.
  # Overrides: CHAT_REACT_PREPARE_TIMEOUT_SEC, CHAT_REACT_RETRIEVE_TIMEOUT_SEC,
  # CHAT_REACT_ANSWER_TIMEOUT_SEC
  prepare_timeout_sec: 20
  retrieve_timeout_sec: 45
  answer_timeout_sec: 120
  native_tool_calling: true
  force_text_tool_models:
    - claude-4.6-opus-reasoning-distilled

model:
  intent_enable_thinking: false
  native_generation_enable_thinking: true
  structured_generation_enable_thinking: false

# Evidence quality gate
# Override: CHAT_EVIDENCE_THRESHOLD, CHAT_EVIDENCE_POLICY
evidence:
  threshold: 0.4
  policy: ask

heuristics:
  usage_match_score:
    source_extension_bonus: 1.0
    query_path_overlap: 1.2
    query_text_overlap: 1.4
    preferred_symbol_path_bonus: 4.0
    preferred_symbol_text_bonus: 3.5
    preferred_symbol_invocation_bonus: 2.5
    preferred_symbol_new_bonus: 1.5
    call_activity_bonus: 0.45
    member_call_activity_bonus: 0.6
    assignment_activity_bonus: 0.3
    base_result_score_bonus: 0.25
    definition_penalty: 1.0
    test_path_penalty: 2.5
    generated_path_penalty: 1.5
  usage_match_caps:
    query_path_overlap: 4
    query_text_overlap: 5
    call_count: 4
    member_call_count: 4
    assignment_count: 3
    lifecycle_groups: 4
    base_result_score: 6
  identifier_structure_score:
    multi_part_unit: 2
    multi_part_cap: 6
    underscore_bonus: 2
    digit_bonus: 1
    long_identifier_threshold: 12
    long_identifier_bonus: 1
  query_term_extraction:
    score_ngram_max: 3
    score_ngram_min_compact: 6
    compound_symbol_min_parts: 2
    compound_symbol_min_compact: 8
    explicit_symbol_bonus: 18
    member_symbol_bonus: 30
    ngram_symbol_bonus: 4
  symbol_query_candidate_score:
    filler_penalty: 4
    structure_multiplier: 3
  term_support_score:
    query_exact: 10.0
    query_suffix: 6.0
    query_contains: 3.0
    path_stem_hit: 5.0
    path_hit: 2.0
    match_hit: 2.0
    definition_hit: 2.5
    content_hit: 1.5
    structure_multiplier: 0.75
  repo_symbol_candidate_score:
    query_exact: 14.0
    query_suffix: 10.0
    query_contains: 6.0
    path_stem_hit: 0.0
    path_hit: 0.0
    match_hit: 0.0
    definition_hit: 0.0
    content_hit: 0.0
    structure_multiplier: 1.0
  search_expansion_term_score:
    query_exact: 18.0
    query_suffix: 12.0
    query_contains: 7.0
    path_stem_hit: 0.0
    path_hit: 0.0
    match_hit: 0.0
    definition_hit: 0.0
    content_hit: 0.0
    structure_multiplier: 1.0
  match_rerank_score:
    cluster_bonus: 0.0
    dir_bonus: 0.0
  path_relevance_score:
    min_token_bonus: 2
  file_profile_score:
    category_unit: 10
    usage_bonus: 6
    calls_bonus: 5
    updates_bonus: 4
    definition_bonus: 3
  code_definition_score:
    type_declaration: 8.5
    function_declaration: 8.0
    callable_signature: 5.5
    fallback: 4.0
    type_keyword_bonus: 2.5
    modifier_bonus: 1.5
    new_expression_penalty: 4.0
    member_call_penalty: 4.5
    assignment_penalty: 1.0
    brace_bonus: 0.5
    stem_bonus: 1.5
    long_line_threshold: 220
    long_line_penalty: 0.5
  search_hit_score:
    base: 1.0
    call_bonus: 0.2
    declaration_bonus: 0.3
    query_exact_hit: 2.0
    query_token_hit: 0.75
    path_token_hit: 0.5
    symbol_definition_bonus: 1.2
    token_hit_cap: 4
    path_hit_cap: 3
    long_line_threshold: 160
    long_line_penalty: 0.1
