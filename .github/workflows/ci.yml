name: CI

on:
  push:
  pull_request:

jobs:
  desktop:
    name: Desktop Quality Gates
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        run: npm ci

      - name: Run desktop regression tests
        run: npm test

      - name: Run desktop type checks
        run: npm run check

      - name: Build desktop renderer
        run: npm run build

  backend:
    name: Backend Regression Suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Compile backend sources
        run: python -m compileall app tests

      - name: Run backend unit tests
        run: python -m unittest discover -s tests -v
